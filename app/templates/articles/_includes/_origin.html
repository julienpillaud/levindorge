{% set origin_exists = article is not none and article.origin %}

{% if category_group.origin %}
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Pays / Région</legend>
    <select class="select select-sm w-full" name="origin" required>
      <option disabled selected></option>
      {% for origin in data.origins %}
        <option
          value='{"name":"{{ origin.name }}","code":"{{ origin.code }}","type":"{{ origin.type }}"}'
          {% if origin_exists and article.origin.name == origin.name %}
          selected
          {% endif %}
        >
          {{ origin.name }}
        </option>
      {% endfor %}
    </select>
  </fieldset>
{% endif %}
